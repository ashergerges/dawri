name: dawri
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter

  # iOS icons
  cupertino_icons: ^1.0.8

  # Firebase core setup
  firebase_core: ^4.11.0
  # Push notifications
  firebase_messaging: ^16.4.0

  # App navigation
  auto_route: ^11.1.0

  # Get device location
  geolocator: ^14.0.2

  flutter_switch: ^0.3.2

  flutter_staggered_animations: ^1.1.1  # List animations

  # Convert coords to address
  geocoding: ^4.0.0

  # Google Maps widget
  google_maps_flutter: ^2.10.0

  # Path provider
  path_provider: ^2.1.5

  # App localization
  easy_localization: ^3.0.3

  # Open app settings
  app_settings: ^7.0.0

  # Calendar picker UI
  calendar_date_picker2: ^3.0.0

  # Download files
  flutter_downloader: ^1.12.0

  # State management
  flutter_bloc: ^9.1.1
  # Bloc utilities
  bloc: ^9.2.1

  # Progress indicators
  percent_indicator: ^4.2.3

  # Date pickers UI
  flutter_date_pickers: ^0.4.2

  # Dependency injection
  get_it: ^9.2.1

  # HTTP client
  dio: ^5.3.3

  # Local storage
  shared_preferences: ^2.1.1

  # Dio logging
  pretty_dio_logger: ^1.3.1

  # Local notifications
  flutter_local_notifications: ^19.5.0

  font_awesome_flutter: ^10.7.0
  dotted_line: ^3.3.0
  dotted_border: ^3.1.0
  # Injectable support
  injectable: ^3.0.0

  # Toast messages
  fluttertoast: ^9.0.0

  # Image zoom view
  photo_view: ^0.15.0

  # Lottie animations
  lottie: ^3.3.0

  # SVG support
  flutter_svg: ^2.0.9

  # Screen size utils
  flutter_screenutil: ^5.9.0

  # Pick images
  image_picker: ^1.0.4

  # App info
  package_info_plus: ^8.3.1

  # Internet checker
  internet_connection_checker: ^1.0.0+1

  # Cache images
  cached_network_image: ^3.3.0

  # Manage permissions
  permission_handler: ^12.0.1

  # Shimmer effects
  shimmer: ^3.0.0

  #icons
  ionicons: ^0.2.2

  # Async utilities
  async: ^2.11.0

  # Loading overlay
  flutter_easyloading: ^3.0.5

  # Auto-scroll text
  marquee_widget: ^1.2.0

  # Loading animations
  loading_animation_widget: ^1.2.0+4

  # Page indicators
  smooth_page_indicator: ^2.0.1

  # Render HTML
  flutter_html: ^3.0.0-alpha.6

  # JSON annotations
  json_annotation: ^4.9.0

  # Launch URLs
  url_launcher: ^6.3.2


  pull_to_refresh: ^2.0.0


  # App updater
  upgrader: ^13.5.0

  # Enhanced scroll view
  nested_scroll_view_plus: ^3.0.0

  # Network debugger
  alice: ^1.0.0

  # Alice for Dio
  alice_dio: ^1.0.7

  #freezed annotation
  freezed_annotation: ^3.1.0
  timelines_plus: ^2.0.0
  pinput: ^6.0.1

  sliver_tools: ^0.2.12
  device_info_plus: ^12.3.0
  flutter_contacts: ^2.1.0      # read phone contacts

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.0
  injectable_generator: ^3.0.2
  # Asset generator
  flutter_gen_runner: ^5.14.1

  # Routes generator
  auto_route_generator: ^10.2.3

  # Freezed Code Generation
  freezed: ^3.2.5
  json_serializable: ^6.7.1

# Flutter generator config
flutter_gen:
  integrations:
    flutter_svg: true
    lottie: true
  assets:
    enabled: true

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/svg/
    - assets/fonts/
    - assets/translations/


  fonts:
      - family: Tajawal
        fonts:
          - asset: assets/fonts/Tajawal-ExtraLight.ttf
            weight: 200
          - asset: assets/fonts/Tajawal-Light.ttf
            weight: 300
          - asset: assets/fonts/Tajawal-Regular.ttf
            weight: 400
          - asset: assets/fonts/Tajawal-Medium.ttf
            weight: 500
          - asset: assets/fonts/Tajawal-Bold.ttf
            weight: 700
          - asset: assets/fonts/Tajawal-ExtraBold.ttf
            weight: 800
          - asset: assets/fonts/Tajawal-Black.ttf
            weight: 900
